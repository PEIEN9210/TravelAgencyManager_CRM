  <button data-tab="visits" style="background:none;border:none;border-bottom:${tab==="visits"?"2px solid var(--color-text-primary)":"2px solid transparent"};padding:7px 16px;font-weight:${tab==="visits"?500:400};cursor:pointer;font-size:12px;color:${tab==="visits"?"var(--color-text-primary)":"var(--color-text-secondary)"}">拜訪歷程（${TOTAL_V} 筆）</button>
</div>
<input id="srch" placeholder="搜尋旅行社名稱或代號…" value="${search}" style="width:100%;margin-bottom:10px;box-sizing:border-box;font-size:13px"/>
${tab==="list"?renderList(filtered):renderVisits(filtered)}
${selected?renderPanel(selected):""}`;

  document.getElementById("exp-a").onclick=exportA;
  document.getElementById("exp-v").onclick=exportV;
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();});
  document.getElementById("srch").oninput=e=>{search=e.target.value;render();};
  document.querySelectorAll("[data-detail]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.detail;selected=selected?.id===id?null:AG.find(a=>a.id===id);render();
  });
  document.querySelectorAll("[data-fetch]").forEach(b=>b.onclick=()=>{fetchOne(AG.find(a=>a.id===b.dataset.fetch));});
  if(selected)document.getElementById("close-p").onclick=()=>{selected=null;render();};
}

function TH(l,c){return`<th style="padding:6px 7px;font-weight:500;font-size:11px;text-align:${c?"center":"left"};white-space:nowrap;position:sticky;top:0;background:#1F4E79;color:#fff;z-index:1">${l}</th>`;}

function renderList(data){
  const rows=data.map((a,i)=>{
    const h=!!(a.taxid||extra[a.id]);
    const bg=h?(i%2===0?"#E8F5E9":"#F1F8E9"):(i%2===0?"var(--color-background-primary)":"var(--color-background-secondary)");
    return`<tr style="background:${bg}">
      <td style="padding:4px 6px;font-size:11px;font-family:monospace;white-space:nowrap">${a.id}</td>
      <td data-detail="${a.id}" style="padding:4px 6px;font-size:11px;font-weight:500;cursor:pointer;color:var(--color-text-info);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.n}</td>
      <td style="padding:4px 6px;font-size:11px;text-align:center;white-space:nowrap">${gf(a,"lei")}</td>
      <td style="padding:4px 6px;font-size:11px;font-family:monospace;white-space:nowrap">${gf(a,"taxid")}</td>
      <td style="padding:4px 6px;font-size:11px;white-space:nowrap">${gf(a,"est")}</td>
      <td style="padding:4px 6px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${gf(a,"addr")}</td>
      <td style="padding:4px 6px;font-size:11px;white-space:nowrap">${gf(a,"tel")}</td>
      <td style="padding:4px 6px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${gf(a,"mgr")}</td>
      <td style="padding:4px 6px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${gf(a,"sup")}</td>
      <td style="padding:4px 6px;font-size:11px;text-align:center">${gf(a,"bw")}</td>
      <td style="padding:4px 6px;font-size:11px;color:var(--color-text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.r}</td>
      <td style="padding:4px 6px;font-size:11px;text-align:center">${a.v}</td>
      <td style="padding:4px 6px;font-size:11px;white-space:nowrap">${a.f}</td>
      <td style="padding:4px 6px;font-size:11px;white-space:nowrap">${a.l}</td>
      <td style="padding:4px 6px;font-size:11px;text-align:center"><button data-fetch="${a.id}" style="font-size:10px;padding:1px 4px">${loadingId===a.id?"…":"查"}</button></td>
    </tr>`;
  }).join("");
  const headers=[["代號"],["旅行社名稱"],["種類",1],["統一編號"],["設立日期"],["地址"],["電話"],["負責人"],["主管機關"],["品保",1],["最後拜訪結果"],["訪次",1],["首訪"],["末訪"],["查",1]];
  return`<div style="overflow-x:auto;max-height:490px;overflow-y:auto;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)">
    <table style="width:100%;border-collapse:collapse;table-layout:fixed;min-width:1180px">
      <colgroup><col style="width:68px"><col style="width:148px"><col style="width:46px"><col style="width:84px"><col style="width:82px"><col style="width:165px"><col style="width:100px"><col style="width:72px"><col style="width:80px"><col style="width:38px"><col style="width:148px"><col style="width:38px"><col style="width:82px"><col style="width:82px"><col style="width:36px"></colgroup>
      <thead><tr>${headers.map(h=>TH(h[0],h[1])).join("")}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="padding:5px 10px;font-size:11px;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary)">
      顯示 ${data.length} / ${TOTAL} 筆（搜尋可篩選） · 綠底 = 已補齊觀光局立案資料（共 ${GOV_MATCHED} 筆）
    </div>
  </div>`;
}

function renderVisits(data){
  const leg=LEGEND.map(x=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:13px;height:13px;border-radius:3px;background:${x.c};border:0.5px solid rgba(0,0,0,0.15);flex-shrink:0"></div><span style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap">${x.l}</span></div>`).join("");
  let seq=0;
  const rows=data.flatMap(a=>(VI[a.id]||[]).map(v=>{
    seq++;
    return`<tr style="background:${rc(v[2])}">
      <td style="padding:4px 6px;font-size:11px;text-align:center">${seq}</td>
      <td style="padding:4px 6px;font-size:11px;font-family:monospace;white-space:nowrap">${a.id}</td>
      <td style="padding:4px 6px;font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.n}</td>
      <td style="padding:4px 6px;font-size:11px;white-space:nowrap">${v[0]}</td>
      <td style="padding:4px 6px;font-size:11px;color:var(--color-text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v[1]}</td>
      <td style="padding:4px 6px;font-size:11px">${v[2]}</td>
    </tr>`;
  })).join("");
  const th2=l=>`<th style="padding:6px 7px;font-weight:500;font-size:11px;text-align:left;white-space:nowrap;position:sticky;top:0;background:#1B5E20;color:#fff;z-index:1">${l}</th>`;
  return`
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;padding:8px 12px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)">
    <span style="font-size:11px;font-weight:500;white-space:nowrap;margin-right:2px">顏色說明：</span>${leg}
  </div>
  <div style="overflow-x:auto;max-height:450px;overflow-y:auto;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)">
    <table style="width:100%;border-collapse:collapse;table-layout:fixed;min-width:800px">
      <colgroup><col style="width:40px"><col style="width:68px"><col style="width:160px"><col style="width:90px"><col style="width:160px"><col></colgroup>
      <thead><tr>${["序號","代號","旅行社名稱","拜訪日期","拜訪當時名稱","拜訪結果"].map(th2).join("")}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="padding:5px 10px;font-size:11px;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary)">共 ${seq} 筆拜訪記錄</div>
  </div>`;
}

function renderPanel(a){
  const fields=[["統一編號",gf(a,"taxid")],["種類",gf(a,"lei")],["設立日期",gf(a,"est")],["地址",gf(a,"addr")],["電話",gf(a,"tel")],["負責人",gf(a,"mgr")],["主管機關",gf(a,"sup")],["品保協會",gf(a,"bw")]].filter(([,v])=>v);
  const vl=(VI[a.id]||[]).slice().reverse();
  return`<div style="position:fixed;right:0;top:0;bottom:0;width:330px;background:var(--color-background-primary);border-left:0.5px solid var(--color-border-tertiary);padding:16px;overflow-y:auto;z-index:100;box-sizing:border-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:11px;font-family:monospace;color:var(--color-text-secondary)">${a.id}</span>
      <button id="close-p" style="border:none;background:none;cursor:pointer;font-size:18px;line-height:1">×</button>
    </div>
    <p style="font-weight:500;font-size:14px;margin:0 0 10px">${a.n}</p>
    ${fields.length?`<div style="display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:12px;margin-bottom:12px">${fields.map(([k,v])=>`<span style="color:var(--color-text-secondary);white-space:nowrap">${k}</span><span style="overflow-wrap:anywhere">${v}</span>`).join("")}</div>`:`<p style="font-size:12px;color:var(--color-text-secondary)">尚未補齊立案資料</p>`}
    <p style="font-weight:500;font-size:12px;margin:0 0 6px">拜訪記錄（${vl.length} 次）</p>
    ${vl.map(v=>`<div style="padding:5px 9px;border-radius:var(--border-radius-md);background:${rc(v[2])};border:0.5px solid rgba(0,0,0,0.08);font-size:11px;margin-bottom:4px"><span style="color:var(--color-text-secondary);margin-right:7px">${v[0]}</span><span>${v[2]}</span></div>`).join("")}
    <div style="margin-top:10px"><button data-fetch="${a.id}" style="font-size:12px;width:100%">${loadingId===a.id?"查詢中…":"🔍 補查觀光局資料"}</button></div>
  </div>`;
}

async function fetchOne(a){
  if(!a)return;loadingId=a.id;render();
  const prompt=`搜尋台灣交通部觀光署旅行業資料，查詢「${a.n}」官方登記，只回傳JSON：{"lei":"","taxid":"","est":"","addr":"","tel":"","mgr":"","sup":"","bw":""}`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt}]})});
    const d=await res.json();
    const t=(d.content?.find(b=>b.type==="text")?.text||"").replace(/```json\n?|```/g,"");
    const m=t.match(/\{[\s\S]*\}/);
    if(m)extra[a.id]=JSON.parse(m[0]);
  }catch(e){}
  loadingId=null;render();
}

function exportA(){
  const rows=[["代號","種類","旅行社名稱（中文）","統一編號","設立日期","地址","電話","負責人","主管機關","品保協會會員","拜訪次數","首次拜訪","最後拜訪","最後拜訪結果"]];
  AG.forEach(a=>rows.push([a.id,gf(a,"lei"),a.n,gf(a,"taxid"),gf(a,"est"),gf(a,"addr"),gf(a,"tel"),gf(a,"mgr"),gf(a,"sup"),gf(a,"bw"),a.v,a.f,a.l,a.r]));
  dl(rows,"旅行社名單.csv");
}
function exportV(){
  const rows=[["序號","代號","旅行社名稱","拜訪日期","拜訪當時名稱","拜訪結果"]];
  let s=1;AG.forEach(a=>(VI[a.id]||[]).forEach(v=>rows.push([s++,a.id,a.n,v[0],v[1],v[2]])));
  dl(rows,"旅行社拜訪歷程.csv");
}
function dl(rows,fn){
  const csv=rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n");
  const url=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));
  Object.assign(document.createElement("a"),{href:url,download:fn}).click();
  URL.revokeObjectURL(url);
}
render();
</script>
